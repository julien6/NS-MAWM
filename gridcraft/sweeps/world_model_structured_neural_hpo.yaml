program: sweep_benchmarl_wm_hpo.py
method: bayes
metric:
  name: World Model Evaluation/wm_hpo_score
  goal: minimize
parameters:
  hpo_family:
    value: structured_neural_k0.0
  baseline_id:
    value: B11_structured_neural_k0.0
  world_model_arch:
    value: structured
  num_agents:
    value: 3
  device:
    value: cuda
  seed:
    values: [1]
  episodes:
    value: 4096
  max_steps:
    value: 256
  num_envs:
    value: 256
  vae_steps:
    value: 0
  rnn_steps:
    value: 10000
  eval_every:
    value: 2500
  video_every:
    value: 0
  horizons:
    value: [1, 5, 10, 25, 50]
  wm_batch_size:
    values: [1024, 2048, 4096]
  wm_num_workers:
    value: 4
  seq_len:
    values: [16, 32, 64]
  learning_rate:
    values: [0.001, 0.0005, 0.0003]
  grid_embed_dim:
    values: [16, 32, 64]
  cnn_channels:
    values: [64, 128, 256]
  self_hidden_size:
    values: [64, 128, 256]
  agent_hidden_size:
    values: [128, 256, 512]
  attention_heads:
    values: [2, 4, 8]
  num_attention_layers:
    values: [1, 2, 3]
  transition_hidden_size:
    values: [128, 256, 512]
  reward_loss_weight:
    values: [5.0, 10.0, 20.0]
  done_loss_weight:
    values: [2.0, 5.0, 10.0]
  event_loss_weight:
    values: [2.0, 5.0, 10.0]
command:
  - ${env}
  - ../.venv/bin/python
  - ${program}
