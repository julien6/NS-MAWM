program: sweep_agent.py
project: ns-mawm-gridcraft
name: gridcraft-policy-baselines
description: Grid sweep over Gridcraft policy baselines, one W&B run per baseline.

method: grid

metric:
  name: MARL evaluation/eval_real_reward
  goal: maximize

parameters:
  baseline_id:
    values: [B00, B24, B25, B26, B27, B28, B29]
  phase:
    value: policy
  policy_baseline:
    value: all
  seed:
    values: [1, 2, 3]
  run_dir:
    value: runs/sweeps/policy
  max_steps:
    value: 500
  policy_updates:
    value: 100
  episodes_per_update:
    value: 8
  policy_eval_every:
    value: 10
  policy_eval_episodes:
    value: 10
  video_max_steps:
    value: 100
  video_fps:
    value: 10
  planning_horizon:
    value: 15
  cem_samples:
    value: 64
  learning_rate:
    value: 0.0003
  skip_extract:
    value: true
  skip_vae:
    value: true

command:
  - ${env}
  - ../.venv/bin/python
  - ${program}
