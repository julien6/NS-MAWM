defaults:
  - mambpo_config
  - _self_

share_param_critic: True
num_qvalue_nets: 2
loss_function: "l2"
delay_qvalue: True
target_entropy: "auto"
discrete_target_entropy_weight: 0.2
alpha_init: 1.0
min_alpha: null
max_alpha: null
fixed_alpha: False
scale_mapping: "biased_softplus_1.0"
use_tanh_normal: True
coupled_discrete_values: True

world_model:
  enabled: true
  n_models: 5
  n_elites: 5
  hidden_sizes: [200, 200, 200, 200]
  lr: 0.001
  train_steps: 50
  train_interval: 250
  batch_size: 512
  stochastic: true
  predict_delta_obs: true
  predict_done: false

imagined_rollouts:
  enabled: true
  rollout_length: 1
  rollout_schedule: null
  model_batch_size: 2048
  real_ratio: 0.1
  diverse_actions: true
  model_buffer_size: 100000
